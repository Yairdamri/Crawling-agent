name: Fetch News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/fetch.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/seen_urls.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            ARTICLE_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/news.json','utf8')).articles.length)")
            git commit -m "chore(news): update feed (${ARTICLE_COUNT} articles)"
            git push
          fi
