name: Test Gemini Connection

on:
  workflow_dispatch: 

jobs:
  verify-ai-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google GenAI Library
        run: pip install google-genai

      # This takes your Secret and logs into Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # We run the Python code directly as a "run" command
      - name: Run Inline Gemini Test
        run: |
          python -c "
          from google import genai
          import os

          client = genai.Client(
              vertexai=True, 
              project='crawling-agent', 
              location='us-central1'
          )

          try:
              response = client.models.generate_content(
                  model='gemini-2.5-flash', 
                  contents='Pipeline Test: Are you receiving this from GitHub Actions?'
              )
              print('\n' + '='*30)
              print('✅ SUCCESS: Gemini responded!')
              print(f'Response: {response.text}')
              print('='*30)
          except Exception as e:
              print(f'\n❌ ERROR: {e}')
              exit(1)
          "