name: Backfill Images

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max number of images to generate this run'
        required: false
        default: '30'
      min_score:
        description: 'Minimum article score (1-10) to include'
        required: false
        default: '8'

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run backfill
        env:
          BACKFILL_LIMIT: ${{ inputs.limit }}
          BACKFILL_MIN_SCORE: ${{ inputs.min_score }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/backfill-images.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/images
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            COUNT=$(git diff --cached --name-only -- data/images | wc -l | tr -d ' ')
            git commit -m "chore(images): backfill ${COUNT} images for top-scored articles"
            git push
          fi
